name: Sync Upstream

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/JingMatrix/Vector.git || true

      - name: Fetch upstream
        run: git fetch upstream master --tags

      - name: Check for upstream commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commit(s) ahead"

      - name: Capture fork baseline
        id: base
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Merge upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/master --no-edit -X ours || {
            git diff --name-only --diff-filter=U > conflicts.txt
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              case "$path" in
                .github/workflows/*)
                  git restore --source="${{ steps.base.outputs.sha }}" --staged --worktree -- "$path" 2>/dev/null || git rm -f -- "$path"
                  ;;
                *)
                  git checkout --ours -- "$path" 2>/dev/null || git rm -f -- "$path"
                  ;;
              esac
            done < conflicts.txt
            rm -f conflicts.txt
            git add -A
            git commit --no-edit
          }

      - name: Re-apply fork update channels
        if: steps.check.outputs.behind != '0'
        run: |
          sed -i 's|raw.githubusercontent.com/JingMatrix/LSPosed/master/zygisk/update.json|raw.githubusercontent.com/larsmartens/Vector/master/zygisk/update.json|g' \
            zygisk/module/module.prop
          sed -i 's|api.github.com/repos/JingMatrix/LSPosed/releases/latest|api.github.com/repos/larsmartens/Vector/releases/latest|g' \
            app/src/main/java/org/lsposed/manager/util/UpdateUtil.java
          sed -i 's|github.com/JingMatrix/LSPosed#install|github.com/larsmartens/Vector#install|g' \
            app/src/main/res/values/strings_untranslatable.xml
          sed -i 's|github.com/JingMatrix/LSPosed/releases/latest|github.com/larsmartens/Vector/releases/latest|g' \
            app/src/main/res/values/strings_untranslatable.xml

          if ! git diff --quiet; then
            git add zygisk/module/module.prop app/src/main/java/org/lsposed/manager/util/UpdateUtil.java app/src/main/res/values/strings_untranslatable.xml
            git commit -m "chore: re-apply fork update channels after upstream sync"
          fi

      - name: Restore fork workflows
        if: steps.check.outputs.behind != '0'
        run: |
          git restore --source="${{ steps.base.outputs.sha }}" --staged --worktree .github/workflows || true
          if ! git diff --quiet -- .github/workflows; then
            git add .github/workflows
            git commit -m "chore: preserve fork workflows after upstream sync"
          fi

      - name: Setup Java
        if: steps.check.outputs.behind != '0'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        if: steps.check.outputs.behind != '0'
        uses: gradle/actions/setup-gradle@v5

      - name: Setup ninja
        if: steps.check.outputs.behind != '0'
        uses: seanmiddleditch/gha-setup-ninja@v6
        with:
          version: 1.12.1

      - name: Setup Android SDK
        if: steps.check.outputs.behind != '0'
        uses: android-actions/setup-android@v3

      - name: Initialize submodules
        if: steps.check.outputs.behind != '0'
        run: git submodule update --init --recursive

      - name: Remove Android's cmake
        if: steps.check.outputs.behind != '0'
        shell: bash
        run: rm -rf "$ANDROID_HOME/cmake"

      - name: Build with Gradle
        if: steps.check.outputs.behind != '0'
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g
        run: ./gradlew --no-daemon --max-workers=2 zipAll

      - name: Update zygisk manifests
        if: steps.check.outputs.behind != '0'
        id: manifest
        run: |
          RELEASE_ZIP=$(find zygisk/release -type f -name 'Vector-v*-Release.zip' | head -1)
          RELEASE_BASENAME=$(basename "$RELEASE_ZIP")
          VERSION=$(echo "$RELEASE_BASENAME" | sed -E 's/^Vector-(v[^-]+)-([0-9]+)-Release\\.zip$/\\1/')
          VERSION_CODE=$(echo "$RELEASE_BASENAME" | sed -E 's/^Vector-(v[^-]+)-([0-9]+)-Release\\.zip$/\\2/')
          TAG_NAME="vector-${VERSION_CODE}"
          CHANGELOG_URL="https://raw.githubusercontent.com/larsmartens/Vector/master/zygisk/changelog.md"
          ZIP_URL="https://github.com/larsmartens/Vector/releases/download/${TAG_NAME}/${RELEASE_BASENAME}"

          cat > zygisk/update.json <<EOF
          {
          	"version": "${VERSION}",
          	"versionCode": ${VERSION_CODE},
          	"zipUrl": "${ZIP_URL}",
          	"changelog": "${CHANGELOG_URL}"
          }
          EOF
          cp zygisk/update.json magisk-loader/update/zygisk.json

          echo "release_zip=${RELEASE_ZIP}" >> "$GITHUB_OUTPUT"
          echo "release_basename=${RELEASE_BASENAME}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Commit updated manifests
        if: steps.check.outputs.behind != '0'
        run: |
          git add zygisk/update.json magisk-loader/update/zygisk.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update fork zygisk manifests"
          fi

      - name: Push synced branch
        if: steps.check.outputs.behind != '0'
        run: git push origin master

      - name: Create release
        if: steps.check.outputs.behind != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.tag_name }}
          name: "Vector ${{ steps.manifest.outputs.tag_name }}"
          make_latest: true
          files: ${{ steps.manifest.outputs.release_zip }}
